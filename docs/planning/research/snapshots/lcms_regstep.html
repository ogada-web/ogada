<script>
// 1. 유저가 이름or핸드폰 클릭 이벤트 / 한국모바일인증 KMC 호출
function requsetKMC(){
  //로딩창 호출
  MsgLayerVisible();
  setTimeout(function(){
    MsgLayerHidden();
}, 5000);

requsetKMC2();
}

function requsetKMC2(){
  //로딩창 호출
  MsgLayerVisible();
  setTimeout(function(){
    MsgLayerHidden();
}, 5000);

  let kmcForm = document.kmcForm;
  let reqKMCISForm = document.reqKMCISForm;
  let params = { // 추가로 보내고 싶은 파라미터
                  Var1: kmcForm.Var1.value,
                  Var2: kmcForm.Var2.value,
                  Var3: kmcForm.Var3.value,
                  Var4: kmcForm.Var4.value
               }
               
  $.ajax({
    url: '/kmc/KMCStep1.json',
    data: params,
    dataType: 'json',
    async: false,
    success: function(result){
      reqKMCISForm.tr_cert.value = result.tr_cert;
      reqKMCISForm.tr_ver.value  = result.tr_ver;
      reqKMCISForm.tr_url.value  = result.tr_url;

      // 인증 팝업창 호출
      openKMCISWindow();
    },
    error: function(error, xhr, status){
      alert("인증번호 발송에 실패하였습니다.");
      console.log(error);
      console.log(xhr);
      console.log(status);
    }
  });
}


// 2. 인증 팝업창 호출
function openKMCISWindow() {
  var UserAgent = navigator.userAgent;
  // 모바일 접근 체크
  // 모바일일 경우 (변동사항 있을경우 추가 필요)
  if (UserAgent.match(/iPhone|iPad|Android|Windows CE|BlackBerry|Symbian|Windows Phone|webOS|Opera Mini|Opera Mobi|POLARIS|IEMobile|lgtelecom|nokia|SonyEricsson/i) != null || UserAgent.match(/LG|SAMSUNG|Samsung/) != null) {
      document.reqKMCISForm.target = '';
  }

  // 모바일이 아닐 경우
  else {
      KMCIS_window = window.open('', 'KMCISWindow', 'width=425, height=550, resizable=0, scrollbars=no, status=0, titlebar=0, toolbar=0, left=435, top=250');

      if (KMCIS_window == null) {
          alert(" ※ 윈도우 XP SP2 또는 인터넷 익스플로러 7 사용자일 경우에는 \n    화면 상단에 있는 팝업 차단 알림줄을 클릭하여 팝업을 허용해 주시기 바랍니다. \n\n※ MSN,야후,구글 팝업 차단 툴바가 설치된 경우 팝업허용을 해주시기 바랍니다.");
      }
      document.reqKMCISForm.target = 'KMCISWindow';
  }
  document.reqKMCISForm.action = 'https://www.kmcert.com/kmcis/web/kmcisReq.jsp';
  document.reqKMCISForm.submit();

  // 팝업에서 인증이 끝나면 팝업에서 tr_url(/kmc/KMCStep2.do)로 이동
}


// jsp에서 인증해야 할 사람이 다수인 경우 인증 후 받을 사람 세팅(include 하고 있는 jsp에 추가)
function setAfterKMC(name, phone){
  document.getElementById("kmc_req_name").value    = name;
  document.getElementById("kmc_req_phoneNo").value = phone;
}

// KMC 콜백 수신 - www 유무 관계없이 같은 도메인이면 허용
window.addEventListener('message', function(e) {
  var senderHost = e.origin.replace(/^https?:\/\/(www\.)?/, '');
  var myHost     = location.host.replace(/^www\./, '');
  if (senderHost !== myHost) return;
  if (e.data && e.data.type === 'KMC_RESULT') {
    if (typeof kcmResultSet === 'function') {
      kcmResultSet(e.data.name, e.data.phoneNo, e.data.Var1, e.data.Var2, e.data.Var3, e.data.Var4);
    }
  }
});
</script>

  if (addrIsAnyFieldFilled) {

// 이메일 형식 검사
function emailValidChk(email) {
  const regex = /^[A-Za-z0-9_\.\-]+@[A-Za-z0-9\-]+\.[A-za-z0-9\-]+/;

  return regex.test(email);
}


// 대표, 원장, 국장 이름 연락처 체크박스 체크 여부 확인
const validateContact = (form) => {
  const directPhoneValue = form.directPhone_1.value.trim() + form.directPhone_2.value.trim() + form.directPhone_3.value.trim();
  // 체크박스 또는 radio라면 checked 속성 사용
  const isCeoChecked = form.ceoContactFlag.checked;
  const isPresiChecked = form.presiContactFlag.checked;
  
  // 일반 input(text)라면 value 사용
  const isDirectorNameFilled = form.directNm && form.directNm.value.trim() !== "";
  const isDirectorPhoneFilled = directPhoneValue !== "";
  
  return !(!isCeoChecked && !isPresiChecked && (!isDirectorNameFilled || !isDirectorPhoneFilled));
}

}

}
