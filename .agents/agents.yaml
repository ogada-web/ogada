# =============================================================================
# 주간보호센터 (Day Care Center) 웹 개발 에이전트 설정
# Project: ogada - 주간보호센터 운영 관리 웹 시스템
# =============================================================================

version: "1.0"
project:
  name: ogada
  description: 주간보호센터 운영 관리 웹 시스템
  domain: healthcare / elderly-care
  stack:
    frontend: React 18 + Vite + TypeScript
    backend: Java 17+ / Spring Boot 3.x
    database: PostgreSQL (dev/prod)
    orm: Spring Data JPA + Flyway
    auth: JWT + RBAC (7역할, SaaS 멀티테넌트)

# =============================================================================
# MODELS (Cursor SDK model IDs)
# =============================================================================
# 우선순위 결정:
#   1) 환경변수 AGENT_MODEL 이 있으면 그 값만 사용 (오버라이드, 폴백 없음)
#   2) 각 에이전트의 `model` (1순위)
#   3) 각 에이전트의 `fallback_models` 리스트 순서대로 시도
#   4) 위에서 모두 실패하면 `models.default`
#   5) 그래도 없으면 코드 내부 폴백값 (composer-2.5)
#
# 폴백 트리거(자동 모델 전환):
# - 모델 한도/토큰/요금 관련 오류 (`quota`, `limit`, `rate`, `billing`, `credit`)
# - 또는 모델 이름이 유효하지 않을 때
#
# 모델 ID 는 Cursor SDK 가 인식해야 한다 (예: composer-2.5, auto).
models:
  # 서버가 공개한 모델 풀 (2026-06, 계정 권한별로 제공):
  #   default, auto, composer-2.5, composer-2,
  #   claude-opus-4-8, claude-opus-4-7, claude-opus-4-6, claude-opus-4-5,
  #   claude-sonnet-4-6, claude-sonnet-4-5, claude-sonnet-4, claude-haiku-4-5,
  #   gpt-5.5, gpt-5.4, gpt-5.4-mini, gpt-5.4-nano, gpt-5.2, gpt-5.1, gpt-5-mini,
  #   gpt-5.3-codex, gpt-5.2-codex, gpt-5.1-codex-max, gpt-5.1-codex-mini,
  #   gemini-3.1-pro, gemini-3-flash, gemini-3.5-flash, gemini-2.5-flash,
  #   grok-build-0.1, grok-4.3
  #
  # doctor RUN-OK (status=finished) 기준 — 2026-06: default, composer-2.5,
  # gpt-5-mini, gemini-2.5-flash. Opus/Sonnet/GPT-5.x 대부분은 RUN-ERR.
  # 진단: `.venv/bin/python scripts/run_agent.py doctor`
  default: composer-2.5
  recommended:
    # 기획 대화 — doctor RUN-OK 모델 우선 (Opus 는 ping 도 RUN-ERR 인 경우 많음)
    planner: claude-opus-4-8
    benchmark_researcher: composer-2.5
    db_architect: claude-opus-4-8
    security_auditor: composer-2.5
    ux_designer: claude-opus-4-8
    tester: composer-2.5
    # 코드 생성 → 코드 특화 모델 (한도 초과 시 GPT-5.5 → Opus 폴백)
    coder: gpt-5.3-codex
    tech_writer: composer-2.5

# =============================================================================
# AGENT IDENTITY (문서 postfix · 소유자 · 독자 구분)
# =============================================================================
# 각 에이전트는 고유 `id`(3~4자)와 `doc_signature`를 갖는다.
# 문서·메모에 메타 태그를 남겨 누가 썼고 누가 읽어야 하는지 구분한다.
#
# 권장 메타 (HTML 주석, 문서 최상단):
#   <!-- doc:owner=PLN doc:audience=COD,TSR updated=2026-06-06T12:00:00+09:00 -->
#
# PLAN_NOTES / QA_FEEDBACK 섹션 제목 postfix:
#   ### [PLN] 추가 질문
#   ### [TSR] Open — v1.2 로그인 실패
#
# 파일명 postfix 는 사용하지 않고(충돌·git noise 방지), 본문 메타만 사용한다.
agent_identity:
  meta_format: html_comment
  meta_template: "<!-- doc:owner={owner} doc:audience={audience} updated={iso8601} -->"
  section_title: "### {doc_signature} {title}"

# =============================================================================
# AGENTS
# =============================================================================
agents:

  # ---------------------------------------------------------------------------
  # 1. 기획자 (Planner / Product Manager)
  # ---------------------------------------------------------------------------
  - name: planner
    id: PLN
    doc_signature: "[PLN]"
    doc_audience: [COD, TSR, UXD, DBA, BNK, TWR]
    role: Product Planner
    # agents.yaml 에 정의된 체인만 사용 (models.default / composer-2.5 자동 추가 없음)
    model_chain_exclusive: true
    # doctor RUN-OK 기준 폴백 — 첫 연결 시 시도, 성공 모델은 세션 고정 (.planner_session.json)
    model: claude-opus-4-8
    fallback_models:
      - composer-2.5
      - default
      - gpt-5-mini
    description: |
      주간보호센터 운영 웹의 전체 기능을 기획하고 요구사항을 정의한다.
      사용자 스토리, 화면 흐름, 기능 우선순위, 데이터 모델 개요를 산출한다.
      docs/planning/REQUIREMENTS.md 및 docs/planning/USER_STORIES.md를 주된 산출물로 관리한다.
    responsibilities:
      - 센터 운영자 / 사회복지사 / 보호자 등 이해관계자 역할 정의
      - "**docs/planning/ROADMAP.md** v1·v2… 단계별 범위·완료 기준·우선순위 관리"
      - 기능 목록 우선순위화 (MoSCoW)
      - "**tester QA_FEEDBACK** Open 항목을 ROADMAP·USER_STORIES·PLAN_NOTES에 반영"
      - "**.agents/workspace_baseline.yaml** 과 git 실측 HEAD 동기화 — 과거 SHA(d5654c0 등) 문서 정리"
      - 화면 흐름도(Flowchart) 및 와이어프레임 명세 작성
      - API 엔드포인트 목록 초안 작성
      - 스프린트 계획 및 마일스톤 관리
    inputs:
      - 사용자 인터뷰 요약 (memory/scratchpad.md)
      - 법적·행정 요건 (노인복지법, 장기요양보험법 관련 항목)
      - docs/qa/QA_FEEDBACK.md           # tester 검증 이슈
      - docs/qa/TEST_REPORT.md           # tester 테스트 결과
      - docs/planning/research/BENCHMARK_REPORT.md      # benchmark_researcher 최신 조사
      - docs/planning/research/COMPETITOR_MATRIX.md     # 기능·서비스 비교 매트릭스
      - memory/decisions.md           # 벤치마킹 기반 결정 이력
    outputs:
      - docs/planning/REQUIREMENTS.md       # 기능 요구사항 명세
      - docs/planning/USER_STORIES.md       # 사용자 스토리
      - docs/planning/ROADMAP.md            # v1·v2… 단계별 구현 로드맵
      - docs/planning/FLOWCHART.md          # 화면 흐름도
      - docs/technical/API_SPEC.md           # REST API 명세 초안
    key_features_to_plan:
      - 어르신 입·퇴소 및 이용자 관리
      - 일일 출석·귀가 체크인/아웃
      - 식사·투약·활동 프로그램 기록
      - 건강 상태 및 낙상 이벤트 기록
      - 보호자 알림(SMS / 카카오 알림톡 연동)
      - 직원 근태·일정 관리
      - 청구·정산 (장기요양 급여 청구 포함)
      - 관리자 대시보드 및 통계 리포트
      - 서류 자동 생성 (이용자 개인별 케어 플랜 등)
    constraints:
      - 개인정보보호법 준수 (이용자 민감 정보 처리)
      - 반응형(모바일 우선) 설계 필수
      - 접근성 기준 WCAG 2.1 AA 준수

  # ---------------------------------------------------------------------------
  # 1-b. 경쟁사 벤치마크 분석가 (Benchmark Researcher)
  # ---------------------------------------------------------------------------
  - name: benchmark_researcher
    id: BNK
    doc_signature: "[BNK]"
    doc_audience: [PLN]
    role: Competitive Research / Benchmark Analyst
    model: claude-opus-4-8
    fallback_models:
      - claude-opus-4-7
      - claude-sonnet-4-6
      - gpt-5.5
      - composer-2.5
      - default
    description: |
      국내외 주간보호·요양기관 관리 웹/앱의 기능·UX·가격·차별점을 조사한다.
      공개 자료뿐 아니라 **역공학(HTML/JS·데모·FAQ·도움말·앱스토어·고시)** 으로
      메뉴 트리·화면 흐름·필드·API 형태를 최대한 복원해 planner 가 기획에 반영할 수 있도록
      구조화된 벤치마크 산출물을 유지한다.
    responsibilities:
      - 경쟁·유사 서비스(케어포, 이지케어, 엔젤시스템, 롱텀 등) 기능·모듈 조사
      - "역공학: 공개 URL·데모·정적 메뉴(func.php)·Channel.io/FAQ·앱스토어·PDF 매뉴얼에서 메뉴·필드·워크플로 추출"
      - 서비스 제공 항목·메뉴·역할별 화면·청구·출석·보호자 포털·배차·본인부담 lifecycle 비교
      - "매 사이클 ogada src/backend·src/frontend git HEAD 실측(Route·page·테스트 수) 후 COMPETITOR_MATRIX baseline 갱신"
      - ogada 대비 갭·차별화 포인트·MVP 우선순위 제안 (G코드·Epic 연결)
      - 조사 근거(URL·스크린샷 대체=인용 문구·조사일·HTTP 상태) 기록 — 「가정」과 「확인」 구분
      - 신규 인사이트는 `memory/decisions.md` 최상단 + BENCHMARK_REPORT §차수(BNK-N) 추가
    inputs:
      - docs/planning/REQUIREMENTS.md (§1-5 벤치마킹, 도메인·MVP 범위)
      - docs/planning/PLAN_NOTES.md
      - docs/planning/ROADMAP.md (갭·우선순위 정합)
      - docs/planning/research/BENCHMARK_REPORT.md (기존 보고서 갱신)
      - docs/planning/research/COMPETITOR_MATRIX.md (기존 매트릭스 갱신)
      - docs/planning/research/snapshots/README.md (오프라인 HTML 스냅샷 카탈로그)
      - docs/planning/research/snapshots/*.html (live URL 오프라인 사본 — md5·grep·DRIFT carry)
      - .agents/workspace_baseline.yaml (ogada HEAD baseline)
    outputs:
      - docs/planning/research/BENCHMARK_REPORT.md       # 경쟁사별 상세 분석 보고서
      - docs/planning/research/COMPETITOR_MATRIX.md      # 기능·서비스 항목 비교 매트릭스
      - docs/planning/research/snapshots/                  # HTML 스냅샷 갱신·신규 추가·README 동기화
      - memory/decisions.md            # 벤치마킹에서 도출된 기획 결정
    research_focus:
      - 핵심 기능 커버리지 (이용자·출석·건강·청구·대시보드)
      - 보호자 포털·모바일 UX·알림톡/SMS 채널
      - 출석·건강 기록·알림 연동·RFID/QR/NFC 비교
      - 청구·급여·공단 엑셀 import·본인부담 7-x lifecycle
      - 배차·이동서비스·지도·이동서비스비(러-1~4)·법정 서식
      - 다지점·SaaS·가격·온보딩·2026 평가·단기보호·통합재가
    reverse_engineering:
      priority_targets:
        - 케어포 daycare/func.php (주야간 109항목 정본)
        - 케어포 demo-work.carefor.co.kr (시설 셸 — 이동서비스 제외 명시)
        - 이지케어 /new.ez(데모 체험 로그인) · Channel.io 도움말 · FAQ rowid 전수
        - 엔젤 silverangel system_feature · lcms CMS
        - 롱텀 수가·고시 law.go.kr (이동서비스비 #44 1차 확인)
      methods:
        - "로컬 스냅샷: `docs/planning/research/snapshots/` — live 재실측 후 md5/SIZE 비교·DRIFT 시 HTML 덮어쓰기·README 표 갱신 (레거시 bare 파일명 → snapshots/ 경로로 해석)"
        - "이지케어 ERP 데모 진입(필수): `./scripts/ezcare-demo-fetch.sh` — 루트 「데모 체험하기」와 동일 흐름(`POST /page/login.php` oCode=DEMO → 세션 쿠키 → `/new.ez`). 비로그인 `/new.ez` 직접 fetch는 70B redirect stub만 반환 — 역공학 금지. 산출: `ezcare_new_ez_demo.html`·`ezcare_top_nav_v2.js`·`ezcare_new_ez_redirect.html`(비교용)"
        - HTTP fetch + HTML 파싱 (loadPage·view·menu-id·href·form field name)
        - 공개 JS 번들·search_menu.js·page-info 메타 추출
        - PDF/동영상 매뉴얼 목차·장 번호 ↔ ogada Route 매핑
        - FAQ·공지 역공학 (기능명·컬럼명·처리상태·엑셀 포맷 변경)
        - 앱스토어 설명·스크린샷 텍스트 (직원/보호자 앱)
        - ogada submodule `git log -1`·Route grep·`npm test`/`mvn test` 집계 실측
      per_cycle_minimum:
        - 신규 **증거 URL 1건 이상** (또는 기존 URL 재실측 + 변동 기록)
        - 경쟁사 **메뉴/필드/워크플로 1블록** 상세 추가 (표 또는 목록)
        - COMPETITOR_MATRIX **1행 이상** ogada `@HEAD` SHA로 갱신
        - BENCHMARK_REPORT **§신규 소절 또는 차수 메모** 1건 이상
      rotation_30min:
        - "0-2h": 케어포 func.php·매뉴얼·demo-work UX 패턴
        - "2-4h": 이지케어 ERP·FAQ·Channel.io·가격·온보딩
        - "4-6h": 엔젤·롱텀·law.go.kr·이동서비스비·2026 수가
        - "6-8h": ogada git 실측·모듈 커버 KPI·갭 우선순위 재산정
        - "8h+": 미확인(#44 등)·교차검증·이전 가정 번복 여부
    constraints:
      - src/ 코드 작성 금지 — docs/ 및 memory/ 만 수정
      - 추측은 「가정」으로 명시, 확인은 「확인」+ 출처 URL·조사일·HTTP/파일 근거
      - 로그인·인증서·유료 계정이 필요한 영역은 「미확인」으로 표시 — 추측을 확인으로 승격 금지
      - 사용자 승인 마커 추가 금지

  # ---------------------------------------------------------------------------
  # 2. UX 디자이너 (UX/UI Designer)
  #    추가 이유: 고령자 대상 서비스는 직관적 UI와 큰 폰트, 고대비 색상이
  #    필수적이며, 별도 설계 에이전트가 디자인 시스템을 일관되게 관리해야 함.
  # ---------------------------------------------------------------------------
  - name: ux_designer
    id: UXD
    doc_signature: "[UXD]"
    doc_audience: [PLN, COD, TSR]
    role: UX / UI Designer
    # 시각/접근성/디자인 토큰 일관성 → Opus 1순위
    model: claude-opus-4-8
    fallback_models:
      - claude-sonnet-4-6
      - claude-opus-4-7
      - gpt-5.5
      - composer-2.5
      - default
    description: |
      사용자 경험을 설계하고 React 기반 디자인 시스템을 구축한다.
      고령자·복지사·관리자 각 페르소나에 최적화된 화면을 설계하며,
      `src/frontend` submodule develop 브랜치에서 UI 토큰·공통 컴포넌트를 정의한다.
    responsibilities:
      - 디자인 시스템(색상 팔레트, 타이포그래피, 간격 토큰) 정의
      - React 공통 UI 컴포넌트(Button, Form, Layout) 설계·스타일
      - "frontend develop 커밋 후 push (run_agent.py build 종료 시 자동 push)"
      - 접근성 검토 (색 대비, 키보드 내비게이션, 스크린 리더, ARIA)
      - 반응형 그리드 및 브레이크포인트 결정
      - 모션·인터랙션 가이드라인 작성
    branch_policy:
      allowed_phases: [develop]
      submodule: frontend
      checkout_branch: develop
      forbidden_paths: [transfer/, src/backend]
    inputs:
      - docs/planning/FLOWCHART.md
      - docs/planning/USER_STORIES.md
      - docs/planning/REQUIREMENTS.md
    outputs:
      - docs/product/DESIGN_SYSTEM.md
      - src/frontend/src/styles/tokens.css
      - src/frontend/src/styles/components.css
      - src/frontend/src/components/ui/
    design_principles:
      - 큰 폰트(기본 16px 이상, 주요 항목 18~20px)
      - 고대비 색상 (WCAG AA 4.5:1 이상)
      - 터치 영역 최소 44×44px
      - 단순하고 명확한 아이콘 + 텍스트 레이블 병행
      - 다크모드 지원 (운영자 야간 근무 고려)

  # ---------------------------------------------------------------------------
  # 3. DB 설계자 (Database Architect)
  #    추가 이유: 의료·복지 데이터는 이력 추적, 감사 로그, 개인정보 분리
  #    등 복잡한 스키마 설계가 필요하므로 전담 에이전트가 필요함.
  # ---------------------------------------------------------------------------
  - name: db_architect
    id: DBA
    doc_signature: "[DBA]"
    doc_audience: [COD, PLN, TSR]
    role: Database Architect
    # 스키마 정합성/인덱스/감사 로그 설계 → Opus 1순위
    model: claude-opus-4-8
    fallback_models:
      - claude-opus-4-7
      - claude-sonnet-4-6
      - gpt-5.5
      - composer-2.5
      - default
    description: |
      주간보호센터 운영에 필요한 데이터베이스 스키마를 설계하고 관리한다.
      마이그레이션 스크립트, ERD, 인덱스 전략, 데이터 보존 정책을 담당한다.
    responsibilities:
      - ERD(Entity Relationship Diagram) 작성
      - 테이블 정의서 및 컬럼 명세 작성
      - Flyway 마이그레이션 (src/backend/src/main/resources/db/migration/)
      - 인덱스·쿼리 최적화 제안
      - 개인정보 분리 저장 전략 (PII 컬럼 암호화 여부 결정)
      - 감사 로그(audit_log) 테이블 설계
      - 백업·복구 전략 문서화
    inputs:
      - docs/planning/REQUIREMENTS.md
      - docs/technical/API_SPEC.md
    outputs:
      - docs/technical/ERD.md
      - src/backend/src/main/resources/db/migration/
      - docs/ops/DATA_RETENTION_POLICY.md
    core_entities:
      - users (직원·관리자 계정)
      - clients (이용자 / 어르신)
      - guardians (보호자)
      - attendance (출석 기록)
      - health_records (건강 상태 기록)
      - medications (투약 기록)
      - meal_records (식사 기록)
      - activity_programs (프로그램)
      - billing (청구·정산)
      - audit_logs (감사 로그)
      - notifications (알림 발송 이력)

  # ---------------------------------------------------------------------------
  # 4. 코더 (Backend + Frontend Developer)
  # ---------------------------------------------------------------------------
  - name: coder
    id: COD
    doc_signature: "[COD]"
    doc_audience: [TSR, PLN, SEC]
    role: Full-Stack Developer
    # 코드 특화 모델 1순위 (doctor OK 확인됨).
    # 한도·거절 시 codex 변형 → GPT-5 → Opus → auto(자동 라우팅) → composer → default.
    model: gpt-5.3-codex
    fallback_models:
      - gpt-5.1-codex-max
      - gpt-5.2-codex
      - gpt-5.5
      - claude-opus-4-8
      - auto
      - composer-2.5
      - default
    description: |
      기획·설계 산출물을 바탕으로 백엔드 API와 프론트엔드 화면을 구현한다.
      **각 submodule의 develop 브랜치에서만** `src/backend`, `src/frontend` 코드를 작성한다.
      이관(transfer)·test·operation 브랜치 및 `transfer/` 폴더는 다루지 않는다.
    responsibilities:
      - "`src/backend` 또는 `src/frontend` submodule 의 `develop` 브랜치에서 Java/React 구현"
      - "작업 단위마다 develop 에 **커밋** — build 종료 시 `git push origin develop` 자동 실행 (미커밋 시 push 불가)"
      - Spring Boot REST API·서비스·JPA 레포지토리, React(Vite) SPA 화면
      - JWT 인증·인가·RBAC, application.yml + 환경변수 기반 설정 (하드코딩 금지)
      - "**신중한 구현** — API_SPEC·기존 DTO/컨트롤러·프론트 `apiFetch` 패턴을 먼저 읽고, 반쪽 UI·잘못된 HTTP 메서드·필드명 불일치 금지"
    branch_policy:
      allowed_phases: [develop]
      submodule_checkout: true
      backend_branch: develop
      frontend_branch: develop
      forbidden_paths: [transfer/]
    inputs:
      - .agents/workspace_baseline.yaml   # 확정 baseline (ROADMAP/QA 과거 SHA보다 우선)
      - docs/planning/ROADMAP.md
      - docs/qa/QA_FEEDBACK.md
      - docs/technical/API_SPEC.md
      - docs/product/DESIGN_SYSTEM.md
      - src/db/schema.sql
    outputs:
      - src/backend/       # Java Spring Boot (develop 브랜치)
      - src/frontend/      # React Vite SPA (develop 브랜치)
    coding_standards:
      - Java: Google Java Style / Spring Boot 관례, Lombok 최소화
      - React: TypeScript strict, 함수형 컴포넌트 + hooks
      - API: REST + OpenAPI 3, DTO·Entity 분리
      - 시크릿·비밀번호는 환경변수(.env)로만 관리
      - SQL은 JPA/JPQL 또는 PreparedStatement만 (문자열 concat 금지)
      - React: dangerouslySetInnerHTML 금지 → JSX 이스케이프 기본
      - "구현 전 **반드시** 대상 API·엔티티·기존 페이지를 읽고 스펙과 필드명을 맞출 것 (추측 구현 금지)"
      - "프론트 API 호출은 `apiFetch`(+ `services.js`)만 사용 — raw `fetch`·JWT 누락 금지"
      - "폼은 `Field` render-prop으로 label·id 연결, 필수값·서버 검증 오류를 필드 단위로 표시"
      - "기능을 '보이게만' 만들지 말 것 — 저장·조회·권한이 end-to-end로 동작하는지 확인 후 커밋"
      - "변경 후 관련 단위 테스트·`mvn test`/`npm test` 최소 1회 실행 (실패 시 수정 후 재시도)"

  # ---------------------------------------------------------------------------
  # 5. 보안 감사관 (Security Auditor)
  #    추가 이유: 의료·복지 데이터(민감 개인정보)를 다루므로 OWASP Top 10
  #    및 개인정보보호법 준수 여부를 전담 검토하는 에이전트가 필수임.
  # ---------------------------------------------------------------------------
  - name: security_auditor
    id: SEC
    doc_signature: "[SEC]"
    doc_audience: [COD, PLN, TSR]
    role: Security Auditor
    # 위협 모델링/엣지 케이스/취약점 추론 → Opus 1순위
    model: claude-opus-4-8
    fallback_models:
      - claude-opus-4-7
      - claude-sonnet-4-6
      - gpt-5.5
      - composer-2.5
      - default
    description: |
      개인정보와 의료 데이터를 다루는 주간보호센터 시스템의 보안을 전담한다.
      OWASP Top 10, 개인정보보호법, 장기요양보험 정보보안 기준을 기준으로
      코드·설정·인프라를 점검하고 취약점 보고서를 작성한다.
    responsibilities:
      - OWASP Top 10 기반 정적 코드 분석
      - 인증·인가 로직 검토 (JWT 유효성, 권한 분리)
      - SQL Injection / XSS / CSRF 취약점 점검
      - 민감 정보 노출 여부 점검 (로그, 에러 메시지, API 응답)
      - 의존성 취약점 스캔 (Maven OWASP dependency-check, npm audit)
      - HTTPS 강제, 보안 헤더(CSP, HSTS 등) 점검
      - 개인정보 처리방침 및 동의 흐름 검토
      - 침투 테스트 시나리오 작성 및 결과 문서화
    inputs:
      - src/ (전체 소스코드)
      - docs/ops/DATA_RETENTION_POLICY.md
    outputs:
      - docs/security/SECURITY_AUDIT.md       # 취약점 점검 결과
      - docs/security/SECURITY_CHECKLIST.md   # 보안 체크리스트
      - docs/security/THREAT_MODEL.md         # 위협 모델링
    security_focus:
      - PII(개인 식별 정보) 암호화 저장 및 전송
      - 역할 기반 접근 제어 (RBAC): 관리자 / 사회복지사 / 보호자
      - 세션 만료 및 재인증 정책
      - 감사 로그 무결성 보장
      - 파일 업로드 검증 (의료 서류 첨부 기능)

  # ---------------------------------------------------------------------------
  # 6. 테스터 (QA Engineer)
  # ---------------------------------------------------------------------------
  - name: tester
    id: TSR
    doc_signature: "[TSR]"
    doc_audience: [PLN, COD]
    role: QA Engineer (Test / 이관)
    # 파이프라인 속도 우선 — 짧은 검증·BLOCK 보고 (장문 Opus 금지)
    model: composer-2
    fallback_models:
      - gpt-5.3-codex
      - claude-sonnet-4-6
      - claude-opus-4-8
      - default
    description: |
      develop → test 이관·검증 단계를 전담한다.
      **submodule test 브랜치에서만** `transfer/` 이관 산출물·검증·테스트 리포트를 관리한다.
      `src/` 코드 직접 수정은 금지 — coder(develop)와 역할을 분리한다.
    responsibilities:
      - "`src/backend` 또는 `src/frontend` submodule 의 `test` 브랜치에서 이관·검증 작업"
      - "transfer/{backend,frontend}/checklists·manifests·packages 갱신"
      - develop 대비 test 이관 가능 여부 검증, TEST_REPORT 작성
      - 회귀·통합 테스트 실행 및 결과 기록 (src/ 수정 없이)
    branch_policy:
      allowed_phases: [test]
      submodule_checkout: true
      backend_branch: test
      frontend_branch: test
      allowed_paths: [transfer/, docs/qa/TEST_REPORT.md, tests/]
      forbidden_paths: [src/backend, src/frontend]
    inputs:
      - docs/planning/USER_STORIES.md
      - docs/technical/API_SPEC.md
      - src/ (develop 산출물 — 읽기 전용)
      - transfer/ (이관 산출물)
      - .agents/branches.yaml
    outputs:
      - transfer/backend/   # 백엔드 이관 체크리스트·매니페스트
      - transfer/frontend/  # 프론트 이관 체크리스트·매니페스트
      - docs/qa/TEST_REPORT.md
      - tests/
    test_scenarios_priority:
      - 이용자 등록·수정·삭제 (CRUD)
      - 출석 체크인/아웃 정확성
      - 투약 기록 누락 방지 (필수 필드 검증)
      - 보호자 알림 발송 확인
      - 권한 없는 사용자의 데이터 접근 차단
      - 동시 접속 시 데이터 정합성

  # ---------------------------------------------------------------------------
  # 7. 문서화 담당 (Technical Writer)
  #    추가 이유: 복지 기관 특성상 비개발자 직원이 시스템을 운영하므로
  #    사용자 매뉴얼, 관리자 가이드, API 문서가 별도로 필요함.
  # ---------------------------------------------------------------------------
  - name: tech_writer
    id: TWR
    doc_signature: "[TWR]"
    doc_audience: [PLN, COD]
    role: Technical Writer
    # 문서/매뉴얼/CHANGELOG → 빠르고 저비용 기본 모델
    model: composer-2.5
    fallback_models:
      - claude-haiku-4-5
      - composer-2
      - default
    description: |
      개발자용 기술 문서와 센터 직원용 사용자 매뉴얼을 작성·관리한다.
      비개발자도 시스템을 원활히 운영할 수 있도록 명확하고 쉬운 문서를 제공한다.
    responsibilities:
      - 사용자 매뉴얼 작성 (센터장·사회복지사·보호자 역할별)
      - API 참조 문서 작성 (OpenAPI/Swagger 기반)
      - 시스템 설치·배포 가이드 작성
      - 데이터 백업·복구 절차서 작성
      - 변경 이력(CHANGELOG) 관리
      - 자주 묻는 질문(FAQ) 작성
    inputs:
      - docs/technical/API_SPEC.md
      - docs/planning/REQUIREMENTS.md
      - src/ (구현된 기능 기준)
    outputs:
      - docs/ops/USER_MANUAL.md          # 역할별 사용자 매뉴얼
      - docs/ops/ADMIN_GUIDE.md          # 시스템 관리자 가이드
      - docs/ops/DEPLOYMENT_GUIDE.md     # 설치·배포 가이드
      - docs/ops/CHANGELOG.md            # 버전별 변경 이력
      - docs/ops/FAQ.md                  # 자주 묻는 질문

# =============================================================================
# WORKFLOW (에이전트 간 협업 흐름)
# =============================================================================
workflow:
  schedule:
    pipeline: "180s (3min) — implement-first: coder→tester ×2; full PLN·DBA·UXD every 6 cycles"
    benchmark_researcher: "1800s (30min) — 경쟁사 벤치마크·역공학 조사"
    security_auditor: "86400s (24h) — 일일 보안 점검"
  phases:
    - phase: 1_planning
      name: 기획 및 요구사항 정의
      lead: planner
      support: [benchmark_researcher, ux_designer, db_architect]
      deliverables:
        - docs/planning/research/BENCHMARK_REPORT.md
        - docs/planning/research/COMPETITOR_MATRIX.md
        - docs/planning/research/snapshots/
        - docs/planning/REQUIREMENTS.md
        - docs/planning/USER_STORIES.md
        - docs/planning/FLOWCHART.md

    - phase: 2_design
      name: 설계
      lead: ux_designer
      support: [db_architect, security_auditor]
      deliverables:
        - docs/product/DESIGN_SYSTEM.md
        - docs/technical/ERD.md
        - docs/technical/API_SPEC.md
        - docs/security/THREAT_MODEL.md

    - phase: 3_implementation
      name: 구현
      lead: coder
      support: [db_architect, security_auditor]
      deliverables:
        - src/ (전체 구현)
        - src/backend/src/main/resources/db/migration/

    - phase: 4_testing
      name: 테스트 및 보안 감사
      lead: tester
      support: [security_auditor]
      deliverables:
        - tests/
        - docs/qa/TEST_REPORT.md
        - docs/security/SECURITY_AUDIT.md
        - docs/security/SECURITY_CHECKLIST.md

    - phase: 5_documentation
      name: 문서화 및 배포 준비
      lead: tech_writer
      support: [planner, coder]
      deliverables:
        - docs/ops/USER_MANUAL.md
        - docs/ops/DEPLOYMENT_GUIDE.md
        - docs/ops/CHANGELOG.md

# =============================================================================
# SHARED MEMORY (에이전트 공유 컨텍스트)
# =============================================================================
shared_memory:
  scratchpad: memory/scratchpad.md       # 에이전트 간 메모 및 결정 사항 기록
  decisions_log: memory/decisions.md    # 주요 설계 결정 이력
  blockers: memory/blockers.md          # 블로커 및 미해결 이슈

# =============================================================================
# GLOBAL CONSTRAINTS (전체 에이전트 공통 제약)
# =============================================================================
global_constraints:
  language: ko  # 주요 주석·문서는 한국어로 작성
  compliance:
    - 개인정보보호법 (PIPA)
    - 노인복지법
    - 장기요양보험법
    - WCAG 2.1 AA (접근성)
    - OWASP Top 10
  never_do:
    - 시크릿·API 키를 소스코드에 하드코딩
    - Raw SQL 문자열 직접 실행
    - innerHTML로 외부 데이터 렌더링
    - 에러 메시지에 스택 트레이스·DB 정보 노출
    - 암호화 없이 민감 개인정보 저장
