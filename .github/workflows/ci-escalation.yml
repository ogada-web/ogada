name: "CI Failure Escalation (12h)"
on:
  schedule:
    # run at 00:00 and 12:00 UTC daily → approx. every 12 hours
    - cron: '0 */12 * * *'

jobs:
  escalate:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Find open CI failure issues and escalate if idle >= 12h
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'ci-failure',
              state: 'open',
              per_page: 100
            });
            const now = new Date();
            for (const issue of issues.data) {
              const updated = new Date(issue.updated_at);
              const hours = (now - updated) / (1000*60*60);
              if (hours >= 12) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: `자동 에스컬레이션(12시간 경과): 이 이슈는 12시간 이상 해결되지 않았습니다. planner 및 운영 담당자가 검토해야 합니다.\n\n- 이슈: ${issue.html_url}`
                });
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  labels: ['escalated']
                });
              }
            }
